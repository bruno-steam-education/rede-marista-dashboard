<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 430" preserveAspectRatio="xMidYMin slice">
  <defs>
    <linearGradient id="limeStroke" x1="835" y1="65" x2="1100" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C8E600"/>
      <stop offset="0.55" stop-color="#8FC400"/>
      <stop offset="1" stop-color="#78B900"/>
    </linearGradient>
    <linearGradient id="orangeStroke" x1="1335" y1="85" x2="1530" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF6A00"/>
      <stop offset="1" stop-color="#F04400"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Pale blue orbital rings behind the heading -->
  <g fill="none">
    <circle cx="505" cy="95" r="122" stroke="#E8F2F8" stroke-width="28" opacity="0.95"/>
    <circle cx="505" cy="95" r="190" stroke="#F1F7FB" stroke-width="26" opacity="0.9"/>
    <circle cx="505" cy="95" r="255" stroke="#F8FBFD" stroke-width="22" opacity="0.9"/>
  </g>

  <!-- Lime ring -->
  <circle cx="965" cy="230" r="116" fill="none" stroke="#C8E600" stroke-width="50" opacity="0.14" filter="url(#softGlow)"/>
  <circle cx="965" cy="230" r="116" fill="none" stroke="url(#limeStroke)" stroke-width="40"/>

  <!-- Orange ring at the far right -->
  <circle cx="1495" cy="235" r="112" fill="none" stroke="#FF5A00" stroke-width="50" opacity="0.12" filter="url(#softGlow)"/>
  <circle cx="1495" cy="235" r="112" fill="none" stroke="url(#orangeStroke)" stroke-width="38"/>

  <!-- Yellow accent dot -->
  <circle cx="872" cy="102" r="22" fill="#FFC928"/>
</svg>
